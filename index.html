<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
      }

      /* Fullscreen wrapper — jediný source of truth pre veľkosť */
      #ar-app {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh; /* dynamic viewport height — fix pre mobile address bar */
      }

      /* A-Scene inherituje veľkosť od wrappera */
      #ar-app a-scene,
      #ar-app a-scene canvas {
        width: 100% !important;
        height: 100% !important;
      }

      /* MindAR internal container + video feed */
      #mindar-ar-container,
      #mindar-ar-container video,
      #mindar-ar-container canvas {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
      }
    </style>
  </head>
  <body>
    <div id="ar-app">
      <a-scene
        mindar-image="imageTargetSrc: ./targets.mind; uiLoading:no; uiScanning:no; filterMinCF: 0.0001;
  filterBeta: 0.001;
  warmupTolerance: 5;
  missTolerance: 5"
        device-orientation-permission-ui="enabled: false"
        embedded
        renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
      >
        <a-assets>
          <video
            id="anika"
            src="./Anika.mp4"
            loop
            muted
            playsinline
            webkit-playsinline
            crossorigin="anonymous"
            preload="auto"
          ></video>
          <video
            id="cheyenne"
            src="./Cheyenne.mp4"
            loop
            muted
            playsinline
            webkit-playsinline
            crossorigin="anonymous"
            preload="auto"
          ></video>
          <video
            id="mia"
            src="./Mia.mp4"
            loop
            muted
            playsinline
            webkit-playsinline
            crossorigin="anonymous"
            preload="auto"
          ></video>
          <video
            id="paolo"
            src="./Paolo.mp4"
            loop
            muted
            playsinline
            webkit-playsinline
            crossorigin="anonymous"
            preload="auto"
          ></video>
          <video
            id="sofia_c"
            src="./Sofia_C.mp4"
            loop
            muted
            playsinline
            webkit-playsinline
            crossorigin="anonymous"
            preload="auto"
          ></video>
          <video
            id="sofia_q"
            src="./Sofia_Q.mp4"
            loop
            muted
            playsinline
            webkit-playsinline
            crossorigin="anonymous"
            preload="auto"
          ></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" play-video="src: #anika">
          <a-video
            src="#anika"
            position="0 0 0"
            height="1.45"
            width="1"
            rotation="0 0 0"
          ></a-video>
        </a-entity>
        <a-entity
          mindar-image-target="targetIndex: 1"
          play-video="src: #cheyenne"
        >
          <a-video
            src="#cheyenne"
            position="0 0 0"
            height="1.45"
            width="1"
            rotation="0 0 0"
          ></a-video>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 3" play-video="src: #mia">
          <a-video
            src="#mia"
            position="0 0 0"
            height="1.45"
            width="1"
            rotation="0 0 0"
          ></a-video>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 4" play-video="src: #paolo">
          <a-video
            src="#paolo"
            position="0 0 0"
            height="1.45"
            width="1"
            rotation="0 0 0"
          ></a-video>
        </a-entity>
        <a-entity
          mindar-image-target="targetIndex: 5"
          play-video="src: #sofia_c"
        >
          <a-video
            src="#sofia_c"
            position="0 0 0"
            height="1.45"
            width="1"
            rotation="0 0 0"
          ></a-video>
        </a-entity>
        <a-entity
          mindar-image-target="targetIndex: 6"
          play-video="src: #sofia_q"
        >
          <a-video
            src="#sofia_q"
            position="0 0 0"
            height="1.45"
            width="1"
            rotation="0 0 0"
          ></a-video>
        </a-entity>
      </a-scene>
    </div>

    <script>
      AFRAME.registerComponent("play-video", {
        schema: { src: { type: "string" } },
        init: function () {
          const video = document.querySelector(this.data.src);
          this.el.addEventListener("targetFound", () => video.play());
          this.el.addEventListener("targetLost", () => video.pause());
        },
      });
    </script>
  </body>
</html>
