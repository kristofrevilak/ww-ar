<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
      }

      /* Fullscreen wrapper — jediný source of truth pre veľkosť */
      #ar-app {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh; /* dynamic viewport height — fix pre mobile address bar */
      }

      /* A-Scene inherituje veľkosť od wrappera */
      #ar-app a-scene,
      #ar-app a-scene canvas {
        width: 100% !important;
        height: 100% !important;
      }

      /* MindAR internal container + video feed */
      #mindar-ar-container,
      #mindar-ar-container video,
      #mindar-ar-container canvas {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
      }
    </style>
  </head>
  <body>
    <div id="ar-app">
      <a-scene
        mindar-image="imageTargetSrc: ./targets.mind; uiLoading:no; uiScanning:no; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 5"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
        renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
      >
        <a-assets>
          <video
            id="margit"
            src="./margit.mp4"
            loop
            muted
            playsinline
            webkit-playsinline
            crossorigin="anonymous"
            preload="auto"
          ></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity
          mindar-image-target="targetIndex: 0"
          play-video="src: #margit"
        >
          <a-video
            src="#margit"
            position="0 0 0"
            height="1.45"
            width="1"
            rotation="0 0 0"
          ></a-video>
        </a-entity>
      </a-scene>
    </div>

    <script>
      AFRAME.registerComponent("play-video", {
        schema: { src: { type: "string" } },
        init: function () {
          const video = document.querySelector(this.data.src);
          this.el.addEventListener("targetFound", () => video.play());
          this.el.addEventListener("targetLost", () => video.pause());
        },
      });

      /* ---- Aggressive resize fix ---- */
      const scene = document.querySelector("a-scene");
      const canvas = () => scene.querySelector("canvas");
      const wrapper = document.getElementById("ar-app");

      const forceResize = () => {
        // 1. A-Frame scene resize
        if (scene.resize) scene.resize();

        // 2. Priamo na canvas — vynúť veľkosť
        const c = canvas();
        if (c) {
          const w = wrapper.clientWidth;
          const h = wrapper.clientHeight;
          c.style.width = w + "px";
          c.style.height = h + "px";
          // Re-render
          if (scene.object3D && scene.renderer) {
            scene.renderer.setSize(w, h, false);
            if (scene.camera) {
              scene.camera.aspect = w / h;
              scene.camera.updateProjectionMatrix();
            }
          }
        }

        // 3. MindAR container
        const container = document.getElementById("mindar-ar-container");
        if (container) {
          const v = container.querySelector("video");
          if (v) {
            v.style.width = "100%";
            v.style.height = "100%";
            v.style.objectFit = "cover";
          }
        }
      };

      // Polling — kontroluje každých 100ms, kým je canvas malý
      const poll = setInterval(() => {
        const c = canvas();
        const w = wrapper.clientWidth;
        const h = wrapper.clientHeight;
        if (c && (c.clientWidth !== w || c.clientHeight !== h)) {
          forceResize();
        }
      }, 100);

      // Zastav polling po 15 sekundách (scéna by mala byť stabilná)
      setTimeout(() => clearInterval(poll), 15000);

      // Po načítaní scény ešte raz
      scene.addEventListener("loaded", () => {
        forceResize();
        setTimeout(forceResize, 100);
        setTimeout(forceResize, 500);
        // Polling môžeme zastaviť
        setTimeout(() => clearInterval(poll), 2000);
      });

      // Pri zmene viewportu
      window.addEventListener("resize", forceResize);
      window.addEventListener("orientationchange", () => {
        setTimeout(forceResize, 250);
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", forceResize);
      }
    </script>
  </body>
</html>
