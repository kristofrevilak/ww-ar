<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
      }

      /* Fullscreen wrapper — jediný source of truth pre veľkosť */
      #ar-app {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh; /* dynamic viewport height — fix pre mobile address bar */
      }

      /* A-Scene inherituje veľkosť od wrappera */
      #ar-app a-scene,
      #ar-app a-scene canvas {
        width: 100% !important;
        height: 100% !important;
      }

      /* MindAR internal container + video feed */
      #mindar-ar-container,
      #mindar-ar-container video,
      #mindar-ar-container canvas {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
      }
    </style>
  </head>
  <body>
    <div id="ar-app">
      <a-scene
        mindar-image="imageTargetSrc: ./targets.mind; uiLoading:no; uiScanning:no; filterMinCF: 0.001; filterBeta: 10; warmupTolerance: 5; missTolerance: 5"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
        renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
      >
        <a-assets>
          <video
            id="margit"
            src="./margit.mp4"
            loop
            muted
            playsinline
            webkit-playsinline
            crossorigin="anonymous"
            preload="auto"
          ></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity
          mindar-image-target="targetIndex: 0"
          play-video="src: #margit"
          smooth-transform="lerpFactor: 0.15"
        >
          <a-video
            src="#margit"
            position="0 0 0"
            height="1.45"
            width="1"
            rotation="0 0 0"
          ></a-video>
        </a-entity>
      </a-scene>
    </div>

    <script>
      AFRAME.registerComponent("play-video", {
        schema: { src: { type: "string" } },
        init: function () {
          const video = document.querySelector(this.data.src);
          this.el.addEventListener("targetFound", () => video.play());
          this.el.addEventListener("targetLost", () => video.pause());
        },
      });

      // Vlastný smoothing — lerp medzi aktuálnou a cieľovou pozíciou
      AFRAME.registerComponent("smooth-transform", {
        schema: {
          lerpFactor: { type: "number", default: 0.15 }, // 0.1 = hladké, 0.3 = responzívne
        },
        init: function () {
          this.targetPosition = new THREE.Vector3();
          this.targetRotation = new THREE.Euler();
          this.currentPosition = new THREE.Vector3();
          this.currentRotation = new THREE.Euler();
          this.smoothing = false;
        },
        tick: function () {
          const el = this.el;
          const object3D = el.object3D;

          // Len keď je target nájdený
          if (!this.smoothing) return;

          // Ulož cieľovú pozíciu/rotáciu z MindAR
          this.targetPosition.copy(object3D.position);
          this.targetRotation.copy(object3D.rotation);

          // Lerp — plynulý prechod medzi aktuálnou a cieľovou pozíciou
          this.currentPosition.lerp(this.targetPosition, this.data.lerpFactor);

          // Rotácia — lerp cez kvaternióny (správne pre uhly)
          this.currentQuat = this.currentQuat || new THREE.Quaternion();
          this.targetQuat = this.targetQuat || new THREE.Quaternion();
          this.currentQuat.setFromEuler(this.currentRotation);
          this.targetQuat.setFromEuler(this.targetRotation);
          this.currentQuat.slerp(this.targetQuat, this.data.lerpFactor);
          this.currentRotation.setFromQuaternion(this.currentQuat);

          // Aplikuj vyhladenú transformáciu
          object3D.position.copy(this.currentPosition);
          object3D.rotation.copy(this.currentRotation);
        },
        events: {
          targetFound: function () {
            this.smoothing = true;
            // Inicializuj na aktuálnu pozíciu (žiadny skok na začiatku)
            this.currentPosition.copy(this.el.object3D.position);
            this.currentRotation.copy(this.el.object3D.rotation);
          },
          targetLost: function () {
            this.smoothing = false;
          },
        },
      });
    </script>
  </body>
</html>
