<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading:no; uiScanning:no; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 5"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="margit"
          src="./margit.mp4"
          loop
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
          preload="auto"
        ></video>
      </a-assets>

      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
        raycaster="objects: .tappable; far: 10000"
        cursor="rayOrigin: mouse; fuse: false"
      ></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" tap-toggle="src: #margit">
        <a-video
          class="tappable"
          src="#margit"
          position="0 0 0"
          height="1"
          width="1"
          rotation="0 0 0"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      AFRAME.registerComponent("tap-toggle", {
        schema: { src: { type: "string" } },
        init: function () {
          const video = document.querySelector(this.data.src);
          // tap na video = toggle
          const plane = this.el.querySelector(".tappable");
          plane.addEventListener("click", () => {
            console.log("TAP detected, paused:", video.paused);
            if (video.paused) video.play();
            else video.pause();
          });
          // ked target zmizne, video pauzni (inak hra mimo plagatu)
          this.el.addEventListener("targetLost", () => video.pause());
        },
      });
    </script>
  </body>
</html>
